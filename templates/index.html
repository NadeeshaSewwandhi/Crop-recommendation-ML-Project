<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  </head>
  <style>

    h1 {
        color:mediumseagreen;
        text-align: center;

    }

    .warning{
        color:red;
        font-weight: bold;
        text-align: center;
    }

    .card{
        margin-left: 410px;
        margin-top: 20px;
        color: white;
    }

    body {
     background-size: cover;          /* ensures image covers the screen */
    background-position: center;     /* centers the image */
    background-repeat: no-repeat;    /* stops tiling */
    background-attachment: fixed;    /* optional: keeps background fixed on scroll */
    transition: background-image 1s ease-in-out;
    min-height: 100vh;               /* ensures full height */
   }


    .container{
        font-weight: bold;
        padding-bottom: 10px;
        border-radius: 15px;
        background: black;
        background: rgba(255, 255, 255, 0.3); /* light transparent background */
        backdrop-filter: blur(5px);         /* blur effect */
        -webkit-backdrop-filter: blur(10px); /* Safari support */
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
    }

    



  </style>
  <body>

    <!--------------------navbar ------------------------>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Crop Recommendation</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">About</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>


    
    <div class="container my-3 mt-3">
        <h1 class="text-success"> Crop Recommendation System <span class="text-success"></span></h1>

        <form action ="/predict" method = "POST">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="Nitrogen">Nitrogen</label>
                    <input type="number" id="Nitrogen" name="Nitrogen" placeholder="Enter Nitrogen" class="form-content">

                </div>

                <div class="col-md-4 mb-3">
                    <label for="Phosporus">Phosporus</label>
                    <input type="number" id="Phosporus" name="Phosporus" placeholder="Enter Phosporus" class="form-content">
                    
                </div>

                <div class="col-md-4 mb-3">
                    <label for="Pottasium">Pottasium</label>
                    <input type="number" id="Pottasium" name="Pottasium" placeholder="Enter Pottasium" class="form-content">
                    
                </div>

            </div>
            
            <div class="row mt-4">
                <div class="col-md-4 mb-3">
                    <label for="Temperture">Temperture</label>
                    <input type="number" step = "0.01" id="Temperture" name="Temperture" placeholder="Enter Temperture" class="form-content">
                    
                </div>

                <div class="col-md-4 mb-3">
                    <label for="Humidity">Humidity</label>
                    <input type="number" step = "0.01" id="Humidity" name="Humidity" placeholder="Enter Humidity" class="form-content">
                    
                </div>

                <div class="col-md-4 mb-3">
                    <label for="PH">PH</label>
                    <input type="number" step = "0.01" id="PH" name="PH" placeholder="Enter PH" class="form-content">
                    
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-md-4">
                    <label for="Rainfall">Rainfall</label>
                    <input type="number" step = "0.01" id="Rainfall" name="Rainfall" placeholder="Enter Rainfall" class="form-content">
                </div>
            </div>


            <div class="row mt-4">
                <div class="col-md-12 text-center">
                    <button type="submit" class="btn btn-lg" style="background-color: #28a745; color: white;">Get Recommendation</button>
                </div>

            </div>
            
             

                


        </form>


        {% if result %}
        <div class="card bg-dark" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title"> Recommend crop is : </h5>
                <p class="card-text">{{result}}</p>
            </div>
       </div>
       {% endif %}


    </div>

    <script>
  const images = [
    "{{ url_for('static', filename='crop1.jpg') }}",
    "{{ url_for('static', filename='crop2.jpg') }}",
    "{{ url_for('static', filename='crop3.jpg') }}",
    "{{ url_for('static', filename='crop4.jpg') }}",
    "{{ url_for('static', filename='crop5.jpg') }}",
    "{{ url_for('static', filename='crop6.jpg') }}",
    "{{ url_for('static', filename='crop7.jpg') }}",
    "{{ url_for('static', filename='crop8.jpg') }}",
    "{{ url_for('static', filename='crop9.jpg') }}",
    "{{ url_for('static', filename='crop10.jpg') }}"
  ];

  let index = 0;

  function changeBackground() {
    document.body.style.backgroundImage = `url('${images[index]}')`;
    index = (index + 1) % images.length;
  }

  changeBackground();
  setInterval(changeBackground, 6000);
</script>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  </body>
</html>
